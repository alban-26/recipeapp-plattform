version: '3.8'

networks:
  recipe-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
  elastic_data:
  recipe_images:

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: [ "CMD", "bash", "-c", "timeout 3 bash -c 'echo -n > /dev/tcp/localhost/8080'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ================= ELK =================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5000:5000/udp"
      - "5000:5000/tcp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - recipe-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/pipelines || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - recipe-network
    restart: always

  # ============== YOUR SERVICES ==============

  user-management:
    image: user-management:1.0.0-SNAPSHOT
    container_name: user-management-container
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      logstash:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8082:8082"
    networks:
      - recipe-network
    restart: always

  recipe:
    image: myapp/recipe:1.0.0-SNAPSHOT
    container_name: recipe-container
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - ./recipe-images:/images
    networks:
      - recipe-network
    restart: always

  shopping-list:
    image: myapp/shopping-list:1.0.0-SNAPSHOT
    container_name: shopping-list-container
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8083:8083"
    networks:
      - recipe-network
    restart: always

  meal-plan:
    image: myapp/meal-plan:1.0.0-SNAPSHOT
    container_name: meal-plan-container
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8084:8084"
    networks:
      - recipe-network
    restart: always
